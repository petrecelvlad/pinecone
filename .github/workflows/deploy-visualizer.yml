name: Deploy OKF Visualizer

on:
  push:
    branches: [main]
    paths:
      - "cone/**"
      - ".github/workflows/deploy-visualizer.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Clone OKF reference agent
        run: git clone https://github.com/GoogleCloudPlatform/knowledge-catalog.git /tmp/knowledge-catalog --depth 1

      - name: Install reference-agent
        run: pip install -e /tmp/knowledge-catalog/okf

      - name: Generate visualization
        run: |
          mkdir -p site
          python -m reference_agent visualize --bundle cone --out site/index.html --name cone-lite

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
