name: Deploy OKF Visualizer

on:
  push:
    branches: [main]
    paths:
      - "cone/**"
      - ".github/workflows/deploy-visualizer.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Clone OKF reference agent
        run: git clone https://github.com/GoogleCloudPlatform/knowledge-catalog.git /tmp/knowledge-catalog --depth 1

      - name: Install reference-agent
        run: pip install -e /tmp/knowledge-catalog/okf

      - name: Generate visualization
        run: |
          mkdir -p site
          python -m reference_agent visualize --bundle cone --out site/index.html --name cone-lite

      - name: Widen cose layout spacing
        run: |
          python3 - <<'PATCH'
          from pathlib import Path

          path = Path("site/index.html")
          html = path.read_text(encoding="utf-8")

          # The upstream viz.js ships cytoscape's default "cose" force-layout options,
          # which clump nodes together at this bundle's scale. Widen spacing by patching
          # the generated HTML's inline script rather than forking the upstream tool.
          cose_opts = (
              '{ name: "cose", animate: false, padding: 30, '
              'nodeRepulsion: 8000000, idealEdgeLength: 120, edgeElasticity: 100, '
              'componentSpacing: 150, nodeOverlap: 20, gravity: 40, numIter: 1500 }'
          )

          initial_old = 'layout: { name: "cose", animate: false, padding: 30 },'
          assert html.count(initial_old) == 1, "initial cose layout line not found — upstream viz.js changed"
          html = html.replace(initial_old, f'layout: {cose_opts},')

          switch_old = 'cy.layout({ name: e.target.value, animate: false, padding: 30 }).run();'
          assert html.count(switch_old) == 1, "layout-switcher line not found — upstream viz.js changed"
          switch_new = (
              'cy.layout(e.target.value === "cose" ? '
              f'{cose_opts} : '
              '{ name: e.target.value, animate: false, padding: 30 }).run();'
          )
          html = html.replace(switch_old, switch_new)

          path.write_text(html, encoding="utf-8")
          print("Patched cose layout spacing.")
          PATCH

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
